<!-- NAV -->
<nav id="navbar">
  <a class="nav-logo" href="#hero">{{ site.data.profile.name }}<span>.</span></a>
  <ul class="nav-links">
    {%- for link in site.data.profile.nav %}
    {%- assign section_key = link.href | remove: "#" -%}
    {%- assign section_cfg = site.data.profile.sections[section_key] -%}
    {%- unless section_cfg.show == false %}
    <li><a href="{{ link.href }}">{{ link.label }}</a></li>
    {%- endunless %}
    {%- endfor %}
  </ul>
</nav>
