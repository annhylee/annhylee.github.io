name: 이혜연
name_en: Hyeyeon Lee

# 히어로 큰 이름 — 항목 하나가 한 줄로 표시됩니다 (여러 항목이면 줄바꿈)
name_lines:
  - 이혜연

tagline: Announcer · Anchor · Reporter · MC

# 타이핑 애니메이션에 순서대로 나오는 문구들
typed_titles:
  - 아나운서 · 뉴스 앵커
  - 방송기자 · 리포터
  - 생방송 MC · 행사 사회
  - 스피치 · 한국어 강사
  - 콘텐츠 크리에이터

hero_desc: |-
  9년간의 방송 현장에서
  언제나 목소리로 정보와 이야기를 전해왔습니다.
  말과 마음이 닿는 모든 현장에 함께하겠습니다.

hero_cta:
  - label: 포트폴리오 보기
    href: "#portfolio"
    style: primary
  - label: 문의하기
    href: "#contact"
    style: outline

# 프로필 사진 경로 — 빈 문자열("")이면 자리표시자 프레임이 표시됩니다.
# 예: /assets/img/profile_red.jpg 또는 /assets/img/profile_white.jpg
photo: /assets/img/profile_red.jpg

stats:
  - num: "9"
    label: Years
  - num: "4+"
    label: Channels
  - num: "∞"
    label: Stories

nav:
  - label: About
    href: "#about"
  - label: Career
    href: "#career"
  - label: Portfolio
    href: "#portfolio"
  - label: Media
    href: "#media"
  - label: Contact
    href: "#contact"

# 각 섹션의 작은 라벨(eyebrow)과 제목
sections:
  about:
    eyebrow: About
    title: |-
      전문 지식을 바탕으로
      신뢰를 만듭니다
  career:
    eyebrow: Career
    title: 커리어 타임라인
  portfolio:
    eyebrow: Portfolio
    title: 아나운서 · 방송기자 · MC 클립
  media:
    eyebrow: Media
    title: 언론 · 미디어 커버리지
    # 섹션 숨김 스위치 — 이 줄을 지우거나 true로 바꾸면 다시 표시됩니다 (내용은 media.yml에 보존)
    show: false
  contact:
    eyebrow: Contact
    title: 함께 일해요

about:
  keywords:
    - 아나운서 · 뉴스 앵커
    - 생방송 MC · 행사 사회
    - 방송기자 · 리포터
    - 스피치 · 한국어 강사
    - 콘텐츠 크리에이터
  show: false
  credentials:
    - label: 경력
      lines:
        - 방송기자 ⏤ 서울경제TV · 법률방송
        - 아나운서 ⏤ HD현대중공업 · 충북방송
    - label: 전문 분야
      lines:
        - 경제 · 법조 · 의학 프로그램 진행 경험
        - 생방송 · 인터뷰 MC · 기업 및 지역 행사
        - 보이스 · 스피치 · 외국인 대상 한국어 강의
    - label: SNS 채널
      lines:
        # 참고: "- text: ... / url: ..." 형태로 쓰면 클릭 가능한 링크로 표시됩니다
        - 유튜브 HYEDLINE 혜드라인 (경제 · 외신 콘텐츠)
    - label: 학력 / 자격
      lines:
        - 한양대학교 체육학과 졸업 (2019.02 졸업)
        - 한국어교원자격 2급 (문화체육관광부 발급)
        - 스피치지도사 1급 · 커뮤니케이션전문가 1급

contact:
  desc: 방송 프로그램, 기업 행사, 유튜브 콘텐츠 등 다양한 분야에서 협업합니다. 편하게 연락 주세요.
  channels:
    - label: Email
      value: annhylee@naver.com
      href: "mailto:annhylee@naver.com"
      icon: "✉️"
      external: true
    - label: YouTube
      value: HYEDLINE 혜드라인
      href: "https://youtube.com/@HYEDLINE"
      icon: "🎬"
      external: true
    - label: Instagram
      value: "@hyedline_"
      href: "https://www.instagram.com/hyedline_"
      icon: "🤍"
      external: true

footer_copy: © 2026 Hyeyeon Lee. All rights reserved.
